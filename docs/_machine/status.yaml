# ── Deliverables (Runnable Demos / Entry Points) ──────────────────────────
deliverables:
  - id: demo-annotate-epic
    title: "Annotate EPIC-KITCHENS split"
    status: validated
    file: "examples/annotate_epic.py"
    run: "python examples/annotate_epic.py --split train --num 10"
    requires:
      - ANTHROPIC_API_KEY or OPENAI_API_KEY (loaded from .env)
      - EPIC_KITCHENS_ROOT (optional, default: data/epic-kitchens)
    last_validated:
      date: "2026-06-18"
      by: "claude"
      method: "end-to-end-test"
      evidence: "Successfully annotated 1 synthetic video using Claude API. Output saved to model annotations store."

  - id: demo-export-training
    title: "Export gold annotations as training data"
    status: ready
    file: "examples/export_training.py"
    run: "python examples/export_training.py --output data/training/sft.jsonl"
    requires: []
    last_validated:
      date: "2026-06-18"
      by: "claude"
      method: "code-review"
      evidence: "Script created, imports validated"

  - id: demo-download-epic
    title: "Download EPIC-KITCHENS dataset"
    status: ready
    file: "examples/download_epic.py"
    run: "python examples/download_epic.py --annotations-only"
    requires: []
    notes: "Full dataset is ~120GB. Use --max-videos N to download subset. Annotations-only is <10MB."
    last_validated:
      date: "2026-06-18"
      by: "claude"
      method: "code-review"
      evidence: "Script created, imports validated"

  - id: demo-create-mini
    title: "Create mini test dataset"
