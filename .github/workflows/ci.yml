name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy types-PyYAML types-pillow

    - name: Run ruff linter
      run: ruff check src/dvas

    - name: Run ruff formatter check
      run: ruff format --check src/dvas

    - name: Run mypy type checker
      run: mypy src/dvas --ignore-missing-imports

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,api,train]"

    - name: Run tests
      run: |
        mkdir -p tmp/pytest
        pytest tests/ -v --tb=short --ignore=tests/test_student_sft_dryrun.py --ignore=tests/test_student_inference.py --basetemp=./tmp/pytest

    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  test-student-sft:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install minimal dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic-settings pytest structlog datasets pyyaml pillow
        pip install -e "." --no-deps

    - name: Run student SFT dry-run tests
      run: |
        mkdir -p tmp/pytest
        pytest tests/test_student_sft_dryrun.py -v --tb=short --basetemp=./tmp/pytest

  docs-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "."

    - name: Validate doc anchors
      run: python scripts/check_doc_anchors.py

    - name: Validate status.yaml
      run: python -c "import yaml; yaml.safe_load(open('docs/_machine/status.yaml', encoding='utf-8'))"

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Bandit security linter
      run: |
        pip install bandit
        bandit -r src/dvas -f json -o bandit-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json
